services:
  backend:
    build:
      context: ./backend
    container_name: neurolex-backend
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    volumes:
      # Persist the SQLite internals DB and uploaded media across restarts
      - backend_db:/app/db
      - backend_media:/app/media
    environment:
      # Keep the SQLite file on the persistent volume
      - DJANGO_SQLITE_DIR=/app/db
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        # Baked into the client bundle at build time. Override for remote backends.
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api}
    container_name: neurolex-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_db:
  backend_media:
